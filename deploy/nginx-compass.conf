server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 材料上传单文件上限 20MB(见 PRD 4.4),这里要留出余量
    client_max_body_size 25M;

    # 不要暴露 Nginx 版本号
    server_tokens off;

    # 开发自检路由在生产环境本身就返回 404,
    # 这里再挡一层 —— 纵深防御,免得哪天 NODE_ENV 配错了就漏出去
    location /api/dev/ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js 的流式渲染与 Server Action 需要
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # AI 接口是流式返回的,默认 60s 超时不够
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 静态资源带 hash,可以长缓存
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── 绑域名 + HTTPS 之后 ──────────────────────────────────
#
# 域名解析到本机后执行:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d 你的域名
#
# certbot 会自动改写本文件、申请证书并配置 80 → 443 跳转。
# 别忘了同时把 .env 里的 NEXT_PUBLIC_SITE_URL 改成 https://你的域名 ——
# 分享裂变的链接是拿这个变量拼的,不改会生成 http 的旧地址。
